name: Deploy to Vercel

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Production Deploy
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check Vercel secrets
        id: guard
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Production Deploy"
              echo ""
              echo "- Skipped because one or more Vercel secrets are missing."
              echo "- Required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.guard.outputs.ready == 'true'
        run: npm ci

      - name: Verify build locally before deploy
        if: steps.guard.outputs.ready == 'true'
        run: |
          npm run lint
          npm run typecheck
          npm run build

      - name: Pull Vercel environment
        if: steps.guard.outputs.ready == 'true'
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel artifacts
        if: steps.guard.outputs.ready == 'true'
        run: npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to production
        if: steps.guard.outputs.ready == 'true'
        id: deploy
        run: |
          url="$(npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Publish deploy summary
        if: steps.guard.outputs.ready == 'true'
        run: |
          {
            echo "## Production Deploy"
            echo ""
            echo "- Environment: production"
            echo "- URL: ${{ steps.deploy.outputs.url }}"
            echo "- Commit: ${{ github.event.workflow_run.head_sha || github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
